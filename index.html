<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Operativa - Vepagos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main id="main-content">
        <div id="menu-principal" style="max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); text-align: center;">
            <h2 style="color: #0b235a; font-size: 24px; font-weight: 700; margin-bottom: 10px;">Acceso al Portal Vepagos</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Seleccione su perfil de acceso al sistema</p>
            
            <button id="btn-seleccionar-admin" style="background-color: #0b235a; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.3s;">
                👑 Iniciar como Administrador
            </button>
            
            <button id="btn-seleccionar-operador" style="background-color: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.3s;">
                📊 Iniciar como Analista (Operador)
            </button>
            
            <p style="color: #999; font-size: 12px; margin-top: 25px;">Módulo Multiperfil de Auditoría e Incidencias</p>
        </div>

        <div id="login-container" style="display: none; max-width: 400px; margin: 100px auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); text-align: center;">
            <h3 style="color: #0b235a; font-size: 20px; font-weight: 700; margin-bottom: 5px;">Ingreso Administrativo</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Introduce tus credenciales de Supabase</p>
            
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="font-size: 14px; font-weight: 500; color: #333;">Correo Electrónico:</label>
                <input type="email" id="login-email" placeholder="admin@correo.com" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
            </div>
            
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="font-size: 14px; font-weight: 500; color: #333;">Contraseña:</label>
                <input type="password" id="login-password" placeholder="******" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
            </div>
            
            <button id="btn-autenticar" style="background-color: #0b235a; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 15px; font-weight: 600; transition: background 0.3s;">Verificar Clave</button>
            <button id="btn-cancelar" style="background: none; color: #666; border: none; margin-top: 15px; cursor: pointer; font-size: 14px; font-weight: 500;">Volver al menú</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="main.js"></script>
</body>
</html>
